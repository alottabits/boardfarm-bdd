name: boardfarm-bdd
---
# Management Network Isolation
# All containers use network_mode: none. Networking is fully managed by Raikou OVS:
#   - mgmt bridge (192.168.55.0/24): SSH access, inter-container services (MongoDB)
#   - Test bridges (cpe-rtr, lan-cpe, rtr-wan, rtr-uplink): test traffic
# Host accesses container services via the mgmt bridge IP (e.g., 192.168.55.11:3000).
# See: docs/management-network-isolation.md

services:
    router:
        image: ghcr.io/alottabits/test-components/router:v1.2.0
        container_name: router
        network_mode: none
        environment:
            - ENABLE_NAT_ON=eth1
            - FRR_AUTO_CONF=yes
            - TRIPLE_PLAY=no
            - CPE_DATA_IFACE=cpe
            - CPE_DATA_BUNDLE=10.1.1.1/24,2001:dead:cafe:1::1/64
            - DHCP_RELAY=eth1,172.25.1.20,2001:dead:beef:2::20
        privileged: true
        hostname: router

    cpe:
        image: ghcr.io/alottabits/test-components/cpe-prplos:v1.2.0
        container_name: cpe
        restart: always
        # NOTE: Privileged mode is required for TR-181 writes to work properly
        privileged: true
        network_mode: none
        command: [/bin/ash, -c, sleep 30 && /sbin/init]

    wan:
        image: ghcr.io/alottabits/test-components/wan:v1.2.0
        container_name: wan
        network_mode: none
        environment:
            - DNS_UPSTREAM=127.0.0.1
            - LEGACY=yes
        privileged: true
        hostname: wan

    sipcenter:
        image: ghcr.io/alottabits/test-components/sip:v1.2.0
        container_name: sipcenter
        network_mode: none
        environment:
            - KAM_LISTEN_IPv4=172.25.1.5
            - KAM_LISTEN_IPv6=2001:dead:beef:2::5
            - KAM_LISTEN_ALIAS=sipcenter.boardfarm.com
            - LEGACY=yes
        privileged: true
        hostname: sipcenter

    lan-phone:
        image: ghcr.io/alottabits/test-components/phone:v1.2.0
        container_name: lan-phone
        network_mode: none
        environment:
            - LEGACY=yes
        privileged: true
        hostname: lan-phone

    wan-phone:
        image: ghcr.io/alottabits/test-components/phone:v1.2.0
        container_name: wan-phone
        network_mode: none
        environment:
            - LEGACY=yes
        privileged: true
        hostname: wan-phone

    wan-phone2:
        image: ghcr.io/alottabits/test-components/phone:v1.2.0
        container_name: wan-phone2
        network_mode: none
        environment:
            - LEGACY=yes
        privileged: true
        hostname: wan-phone2

    lan:
        image: ghcr.io/alottabits/test-components/lan:v1.2.0
        container_name: lan
        network_mode: none
        environment:
            - LEGACY=yes
        privileged: true
        hostname: lan

    dhcp:
        image: ghcr.io/alottabits/test-components/dhcp:v1.2.0
        container_name: dhcp
        network_mode: none
        environment:
            - LEGACY=yes
        privileged: true
        hostname: dhcp
        volumes:
            - ./config/kea-dhcp4.conf:/etc/kea/kea-dhcp4.conf
            - ./config/kea-dhcp6.conf:/etc/kea/kea-dhcp6.conf

    mongo:
        image: mongo:4.4
        restart: always
        privileged: true
        container_name: mongo
        network_mode: none
        hostname: mongo
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=bigfoot1
            - MONGO_DATA_DIR=/data/db
            - MONGO_LOG_DIR=/var/log/mongodb
        volumes:
            - data_db:/data/db
            - data_configdb:/data/configdb

    acs:
        image: ghcr.io/alottabits/test-components/acs:v1.2.0
        depends_on:
            - mongo
        restart: always
        container_name: acs
        network_mode: none
        hostname: acs
        environment:
            - LEGACY=yes
            - GENIEACS_UI_JWT_SECRET=bigfoot1
            - GENIEACS_CWMP_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-cwmp-access.log
            - GENIEACS_NBI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-nbi-access.log
            - GENIEACS_FS_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-fs-access.log
            - GENIEACS_UI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-ui-access.log
            - GENIEACS_DEBUG_FILE=/var/log/genieacs/genieacs-debug.yaml
            - GENIEACS_EXT_DIR=/opt/genieacs/ext
            - GENIEACS_MONGODB_CONNECTION_URL=mongodb://admin:bigfoot1@192.168.55.9:27017
        privileged: true
        volumes:
            - opt_volume:/opt

    raikou-net:
        container_name: orchestrator
        image: ghcr.io/ketantewari/raikou/orchestrator:v1
        volumes:
            - /lib/modules:/lib/modules
            - /var/run/docker.sock:/var/run/docker.sock
            - ./config.json:/root/config.json
        privileged: true
        environment:
            - USE_LINUX_BRIDGE=false
        pid: host
        network_mode: host
        hostname: orchestrator
        depends_on:
            - router
            - wan
            - lan
            - dhcp
            - acs
            - cpe
            - sipcenter
            - lan-phone
            - wan-phone
            - wan-phone2

volumes:
    data_db:
    data_configdb:
    opt_volume:
