# Productivity server — HTTP on 8080, HTTPS + HTTP/3 on 443
# index.html, large_asset.js, /api/latency (Application Response Time)
#
# Phase 3.5: TLS via testbed CA certs (volume-mounted at /certs/).
# HTTP/3 (QUIC) enabled — browsers upgrade via Alt-Svc on second request.

# HTTP — retained for backward compatibility during Phase 3 → 3.5 transition
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /api/latency {
        gzip off;
        fastcgi_pass unix:/var/run/fcgiwrap/fcgiwrap.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/api/latency.cgi;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }
}

# HTTPS + HTTP/2 + HTTP/3 (Phase 3.5)
server {
    listen 443 ssl;
    listen 443 quic reuseport;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;

    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_protocols       TLSv1.3;

    # Advertise HTTP/3 — browsers upgrade on second request to same origin
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }

    location /api/latency {
        gzip off;
        fastcgi_pass unix:/var/run/fcgiwrap/fcgiwrap.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/share/nginx/api/latency.cgi;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
    }
}
