# Streaming server — HTTP on 8081, HTTPS on 8443
# Proxies /hls/* to MinIO via Raikou OVS content-internal (10.100.0.2:9000).
# NOT Docker network — uses eth2 (content-internal) only.
# HLS manifest and segments from bucket streaming-content
#
# Phase 3.5: TLS via testbed CA certs. QUIC is optional for streaming
# (HLS over HTTPS is sufficient).

# HTTP — retained for backward compatibility
server {
    listen 8081;
    server_name _;

    location /hls/ {
        proxy_pass http://10.100.0.2:9000/streaming-content/;
        proxy_set_header Host 10.100.0.2:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}

# HTTPS + HTTP/2 (Phase 3.5)
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_protocols       TLSv1.3;

    location /hls/ {
        proxy_pass http://10.100.0.2:9000/streaming-content/;
        proxy_set_header Host 10.100.0.2:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
