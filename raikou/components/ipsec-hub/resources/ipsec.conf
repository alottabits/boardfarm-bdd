# StrongSwan IKEv2 responder — hub peer for LinuxSDWANRouter tunnel
#
# Certificate paths use StrongSwan standard directories:
#   /etc/ipsec.d/cacerts/ca.crt     ← testbed CA root
#   /etc/ipsec.d/certs/hub.crt      ← hub identity cert
#   /etc/ipsec.d/private/hub.key    ← corresponding private key
#
# See: docs/LinuxSDWANRouter_Implementation_Plan.md §3.4

config setup
    charondebug="ike 1, knl 1, cfg 0"

conn sdwan-overlay
    keyexchange=ikev2
    left=%defaultroute
    leftid=@hub.sdwan.testbed
    leftcert=hub.crt
    leftsubnet=203.0.113.0/24
    right=%any
    rightid=@dut.sdwan.testbed
    rightsubnet=192.168.10.0/24
    auto=add
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!
    dpdaction=clear
    dpddelay=30s
