# StrongSwan IKEv2 configuration — Phase 3.5 Digital Twin Hardening
# Tunnel from LinuxSDWANRouter to a stub hub peer via WAN1.
#
# Certificate paths use StrongSwan standard directories:
#   /etc/ipsec.d/cacerts/ca.crt     ← testbed CA root
#   /etc/ipsec.d/certs/dut.crt      ← LinuxSDWANRouter identity cert
#   /etc/ipsec.d/private/dut.key    ← corresponding private key
#
# See: docs/LinuxSDWANRouter_Implementation_Plan.md §3.4
# See: docs/Testbed_CA_Setup.md §5.3, §6

config setup
    charondebug="ike 1, knl 1, cfg 0"

conn sdwan-overlay
    keyexchange=ikev2
    left=%defaultroute
    leftid=@dut.sdwan.testbed
    leftcert=dut.crt
    leftsubnet=192.168.10.0/24
    right=172.16.0.20
    rightid=@hub.sdwan.testbed
    rightsubnet=203.0.113.0/24
    auto=start
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!
    dpdaction=restart
    dpddelay=30s
