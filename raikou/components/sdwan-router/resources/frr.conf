!
! SD-WAN Router FRR configuration
! Dual WAN with BFD echo-mode failover (300ms detection)
! Interfaces: eth-lan (LAN), eth-wan1 (WAN1), eth-wan2 (WAN2)
!
! IPs from SDWAN_Testbed_Configuration.md
!
service integrated-vtysh-config

hostname sdwan-router
password Quagga
enable password Quagga
log stdout informational
log facility daemon
!
! == Interfaces ==
!
interface eth-lan
 ip address 192.168.10.1/24
!
interface eth-wan1
 description WAN1 - Primary (MPLS/Fiber)
 ip address 10.10.1.1/30
!
interface eth-wan2
 description WAN2 - Backup (Internet/Cable)
 ip address 10.10.2.1/30
!
interface lo
!
! == BFD: Echo mode for sub-second WAN failure detection ==
!
! Echo packets sent to WAN gateway; TC container's IP stack reflects them
! back. When netem drops packets, echoes fail after detect-multiplier →
! nexthop unreachable → static route withdrawn by FRR zebra NHT.
!
bfd
 !
 peer 10.10.1.2 local-address 10.10.1.1 interface eth-wan1
  receive-interval 1000
  transmit-interval 1000
  detect-multiplier 3
  echo-mode
  echo receive-interval 100
 !
 peer 10.10.2.2 local-address 10.10.2.1 interface eth-wan2
  receive-interval 1000
  transmit-interval 1000
  detect-multiplier 3
  echo-mode
  echo receive-interval 100
 !
!
! == Static routes ==
!
! Default routes are managed by the init script via direct kernel 'ip route add'
! commands with different kernel metrics (WAN1=10, WAN2=200).  This avoids FRR
! staticd's EEXIST race condition: when FRR staticd manages two routes to the
! same prefix with the same kernel metric (FRR 10.x default = 20), a transient
! collision causes repeated "Route 0.0.0.0/0 failed to install" log errors even
! though the route eventually succeeds.  Using kernel routes with distinct metrics
! allows both routes to coexist in the kernel simultaneously; the kernel selects
! the lowest metric for forwarding with no FRR involvement required.
!
! == PBR for application steering ==
! == PBR for application steering ==
! Applied dynamically via vtysh by LinuxSDWANRouter.apply_policy()
!
ip forwarding
ipv6 forwarding
!
