# Fluent Bit — Centralized Log Collector for SD-WAN testbed
# Tails Docker JSON log files. Works for all containers including network_mode: none (DUT).
# Output: unified chronological log at /logs/sdwan-testbed.log
#
# See: docs/Centralized_Log_Collector_Implementation.md

[SERVICE]
    Flush             5
    Daemon            Off
    Log_Level         info
    Parsers_File      /fluent-bit/etc/parsers.conf

# Tail Docker JSON log files directly. Works for all containers including
# network_mode: none. Docker captures stdout/stderr for all containers.
# Path_Key adds file path so we can extract container name from it.
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Path_Key          filepath
    Parser            docker_json
    Docker_Mode       On
    Docker_Mode_Flush 4
    DB                /fluent-bit/db/pos.db
    Refresh_Interval  10
    Rotate_Wait       30

# Enrich each record with container name and testbed label.
[FILTER]
    Name              record_modifier
    Match             docker.*
    Record            testbed sdwan-testbed

# Format as [timestamp] [container_name] message. Extracts container name from
# Docker config.v2.json (path from filepath).
[FILTER]
    Name              lua
    Match             docker.*
    script            /fluent-bit/etc/format.lua
    call              format_log

# Unified log file. Output format: [timestamp] [container_name] message
[OUTPUT]
    Name              file
    Match             *
    Path              /logs
    File              sdwan-testbed.log
    Format            template
    Template          {log}
