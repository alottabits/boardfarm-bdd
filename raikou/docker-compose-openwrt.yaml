name: boardfarm-bdd-openwrt
---
# OpenWrt RPi Gateway Configuration
# This compose file is used with a physical Raspberry Pi running OpenWrt
# instead of the containerized PrplOS CPE.
#
# Architecture:
#   - OpenWrt RPi WAN connects to cpe-rtr bridge (10.1.1.x)
#   - Router container (ISP Edge Router) provides gateway between CPE and WAN services
#   - Router has: cpe interface (10.1.1.1) on cpe-rtr, eth1 (172.25.1.1) on rtr-wan
#   - Router provides NAT and routing between CPE network and ISP services
#   - LAN container (client device) connects to OpenWrt's LAN side via lan-cpe bridge
#
# USB-Ethernet dongles on host:
#   - enx00e04c5b7570 -> cpe-rtr bridge (RPi WAN side, 10.1.1.x network)
#   - enx00e04c327b58 -> lan-cpe bridge (RPi LAN side)

services:
    router:
        image: ghcr.io/alottabits/boardfarm-bdd/router:v1.2.0
        container_name: router
        ports:
            - 4000:22
        environment:
            - ENABLE_NAT_ON=eth1,aux0
            - FRR_AUTO_CONF=yes
            - TRIPLE_PLAY=no
            - CPE_DATA_IFACE=cpe
            - CPE_DATA_BUNDLE=10.1.1.1/24,2001:dead:cafe:1::1/64
            - DHCP_RELAY=eth1,172.25.1.20,2001:dead:beef:2::20
        privileged: true
        hostname: router

    # NOTE: CPE service removed - using physical RPi with OpenWrt instead

    wan:
        image: ghcr.io/alottabits/boardfarm-bdd/wan:v1.2.0
        container_name: wan
        ports:
            - 4001:22
            - 8001:8080
        environment:
            - DNS_UPSTREAM=8.8.8.8
            - LEGACY=no
        privileged: true
        hostname: wan

    sipcenter:
        image: ghcr.io/alottabits/boardfarm-bdd/sip:v1.2.0
        container_name: sipcenter
        ports:
            - 4005:22
        environment:
            - KAM_LISTEN_IPv4=172.25.1.5
            - KAM_LISTEN_IPv6=2001:dead:beef:2::5
            - KAM_LISTEN_ALIAS=sipcenter.boardfarm.com
            - LEGACY=no
        privileged: true
        hostname: sipcenter

    lan-phone:
        image: ghcr.io/alottabits/boardfarm-bdd/phone:v1.2.0
        container_name: lan-phone
        ports:
            - 4006:22
        environment:
            - LEGACY=no
        privileged: true
        hostname: lan-phone

    wan-phone:
        image: ghcr.io/alottabits/boardfarm-bdd/phone:v1.2.0
        container_name: wan-phone
        ports:
            - 4007:22
        environment:
            - LEGACY=no
        privileged: true
        hostname: wan-phone

    wan-phone2:
        image: ghcr.io/alottabits/boardfarm-bdd/phone:v1.2.0
        container_name: wan-phone2
        ports:
            - 4008:22
        environment:
            - LEGACY=no
        privileged: true
        hostname: wan-phone2

    lan:
        image: ghcr.io/alottabits/boardfarm-bdd/lan:v1.2.0
        container_name: lan
        ports:
            - 4002:22
            - 8002:8080
        environment:
            - LEGACY=no
        privileged: true
        hostname: lan

    dhcp:
        image: ghcr.io/alottabits/boardfarm-bdd/dhcp:v1.2.0
        container_name: dhcp
        ports:
            - 4003:22
        environment:
            - LEGACY=no
        privileged: true
        hostname: dhcp
        volumes:
            - ./config/kea-dhcp4.conf:/etc/kea/kea-dhcp4.conf
            - ./config/kea-dhcp6.conf:/etc/kea/kea-dhcp6.conf

    mongo:
        image: mongo:4.4
        restart: always
        privileged: true
        container_name: mongo
        hostname: mongo
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=bigfoot1
            - MONGO_DATA_DIR=/data/db
            - MONGO_LOG_DIR=/var/log/mongodb
        volumes:
            - data_db:/data/db
            - data_configdb:/data/configdb
        ports:
            - 27017:27017

    acs:
        image: ghcr.io/alottabits/boardfarm-bdd/acs:v1.2.0
        depends_on:
            - mongo
        restart: always
        container_name: acs
        hostname: acs
        environment:
            - LEGACY=no
            - GENIEACS_UI_JWT_SECRET=bigfoot1
            - GENIEACS_CWMP_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-cwmp-access.log
            - GENIEACS_NBI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-nbi-access.log
            - GENIEACS_FS_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-fs-access.log
            - GENIEACS_UI_ACCESS_LOG_FILE=/var/log/genieacs/genieacs-ui-access.log
            - GENIEACS_DEBUG_FILE=/var/log/genieacs/genieacs-debug.yaml
            - GENIEACS_EXT_DIR=/opt/genieacs/ext
            - GENIEACS_MONGODB_CONNECTION_URL=mongodb://admin:bigfoot1@mongo:27017
        privileged: true
        ports:
            - 4503:22
            - 7547:7547
            - 7557:7557
            - 7567:7567
            - 3000:3000
        volumes:
            - opt_volume:/opt

    raikou-net:
        container_name: orchestrator
        image: ghcr.io/ketantewari/raikou/orchestrator:v1
        volumes:
            - /lib/modules:/lib/modules
            - /var/run/docker.sock:/var/run/docker.sock
            - ./config_openwrt.json:/root/config.json
        privileged: true
        environment:
            - USE_LINUX_BRIDGE=false
        pid: host
        network_mode: host
        hostname: orchestrator
        depends_on:
            - router
            - wan
            - lan
            - dhcp
            - acs
            - sipcenter
            - lan-phone
            - wan-phone
            - wan-phone2

volumes:
    data_db:
    data_configdb:
    opt_volume:


networks:
    default:
        ipam:
            config:
                - subnet: 192.168.55.0/24
                  gateway: 192.168.55.1

